<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <meta name="description" content="{{ description }}" />
  <link rel="canonical" href="{{ share_page_url }}" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MatchWear" />
  <meta property="og:title" content="{{ title }}" />
  <meta property="og:description" content="{{ description }}" />
  <meta property="og:url" content="{{ share_page_url }}" />
  <meta property="og:image" content="{{ og_image }}" />
  <meta property="og:image:secure_url" content="{{ og_image }}" />
  <meta property="og:locale" content="ru_RU" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ title }}" />
  <meta name="twitter:description" content="{{ description }}" />
  <meta name="twitter:image" content="{{ og_image }}" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 24px; background: #fbfbf8; color: #171717; }
    main { max-width: 420px; margin: 0 auto; }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 12px; }
    p { margin: 0 0 20px; line-height: 1.45; color: #444; }
    a.btn { display: inline-block; padding: 12px 20px; background: #171717; color: #fff; text-decoration: none; border-radius: 12px; font-weight: 600; }
    a.btn:focus-visible { outline: 2px solid #2481cc; outline-offset: 2px; }
  </style>
</head>
<body>
  <main>
    <h1>{{ title }}</h1>
    <p>{{ description }}</p>
    <p><a class="btn" href="{{ app_url }}">Открыть в MatchWear</a></p>
  </main>
</body>
</html>
